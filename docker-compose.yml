version: "3.9"

# ─────────────────────────────────────────────
# GulfAgent — local development stack
# Usage: docker compose up
# ─────────────────────────────────────────────

services:

  # ── FastAPI backend ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulfagent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js frontend ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gulfagent-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev

  # ── Redis (BullMQ task queue) ──────────────
  redis:
    image: redis:7-alpine
    container_name: gulfagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ── Redis Commander (dev UI) ───────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gulfagent-redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - debug

volumes:
  redis_data:
