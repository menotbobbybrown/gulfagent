# GulfAgent — nginx reverse proxy config
# Phase 4 (T79): SSL, gzip, rate limiting, SSE buffering disabled

# T79 — Rate limiting zone
limit_req_zone $binary_remote_addr zone=gulfagent:10m rate=30r/s;

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # T79 — Redirect HTTP → HTTPS in production (toggleable)
    # return 301 https://$host$request_uri;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 1024;

    # T79 — Larger proxy buffer sizes for API responses
    proxy_buffers 8 32k;
    proxy_buffer_size 8k;
    proxy_busy_buffers_size 64k;

    # API proxy
    location /api/ {
        # T79 — Apply rate limiting to API routes (webhooks excluded via IP)
        limit_req zone=gulfagent burst=40 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # T79 — Stripe webhooks: no rate limit, large payload support
    location /api/webhooks/stripe {
        limit_req off;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;

        # Stripe sends large payloads
        client_max_body_size 64k;
        proxy_request_buffering on;
    }

    # WhatsApp webhooks
    location /api/webhooks/whatsapp {
        limit_req off;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 1m;
    }

    # Health check (backend)
    location /health {
        limit_req zone=gulfagent burst=10 nodelay;
        proxy_pass http://backend/health;
    }

    # API docs
    location /docs {
        proxy_pass http://backend/docs;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}